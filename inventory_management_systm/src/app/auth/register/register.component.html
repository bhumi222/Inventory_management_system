<html>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
    <form #userForm = "ngForm" (ngSubmit)="addUser(userForm.value)"   class="space-y-4">
      <div>
        <label class="block mb-1 font-medium">Username</label>
        <input type="text" placeholder="Enter username" name="username" ngModel required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
         
      </div>
      <div>
        <label class="block mb-1 font-medium">Email</label>
        <input type="email" placeholder="Enter email" name="email" ngModel required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
            
      </div>
      <div>
        <label class="block mb-1 font-medium">Password</label>
        <input type="password" placeholder="Enter password" name="password" ngModel required
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                
      </div>
      <button type="submit"
              class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">
        Register
      </button>
    </form>
    <p class="text-sm text-center mt-4">Already have an account?
      <a routerLink="/" class="text-green-500 hover:underline">Login</a>
    </p>
</div>
</body>
</html>
