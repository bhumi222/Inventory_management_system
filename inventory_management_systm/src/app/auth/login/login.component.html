<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
    <form #Login="ngForm" (ngSubmit)="userLogin(Login.value)" class="space-y-4">
      <div>
        <label class="block mb-1 font-medium">Email</label>
        <input type="text" placeholder="Enter email" name="email" [ngModel]="userData?.email"
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block mb-1 font-medium">Password</label>
        <input type="password" placeholder="Enter password" name="password" [ngModel]="userData?.password"
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit"
              class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
        Login
      </button>
      <div *ngIf="errorMessage !== null" class="text-red-500 text-center">
        <h2>{{errorMessage}}</h2>
      </div>
    </form>
    <p class="text-sm text-center mt-4">Don't have an account?
      <a routerLink="/register" class="text-blue-500 hover:underline">Register</a>
    </p>
  </div>
</body>
</html>
